name: Build VectorFlow Ultimate

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install deps
        run: pip install customtkinter Pillow vtracer svglib reportlab pyinstaller
      - name: Build
        run: |
          pyinstaller --noconsole --onefile `
          --collect-all vtracer `
          --collect-all customtkinter `
          --icon "icon.ico" `
          --name "VectorFlow_Ultimate_V10" `
          main.py
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VectorFlow_App
          path: dist/VectorFlow_Ultimate_V10.exe
